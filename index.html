<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PulseGurgaon</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#f5f7fb;
}

/* HEADER */
header {
  background: linear-gradient(90deg,#ff3b3b,#ff0000);
  color:white;
  padding:15px 20px;
  font-size:22px;
  font-weight:bold;
}

/* NAV */
.nav {
  display:flex;
  gap:10px;
  padding:10px;
  background:white;
}

.nav button {
  padding:8px 14px;
  border:none;
  border-radius:20px;
  background:#eee;
  cursor:pointer;
}

.nav button.active {
  background:red;
  color:white;
}

/* SEARCH */
.search {
  display:flex;
  padding:10px;
  background:white;
  gap:10px;
}

.search input {
  flex:1;
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

.search button {
  background:red;
  color:white;
  border:none;
  padding:10px 15px;
  border-radius:10px;
}

/* GRID */
.container {
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(300px,1fr));
  gap:15px;
  padding:15px;
}

/* CARD */
.card {
  background:white;
  border-radius:12px;
  padding:15px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
  cursor:pointer;
  transition:0.2s;
}

.card:hover {
  transform:translateY(-4px);
}

.category {
  font-size:12px;
  color:red;
  font-weight:bold;
}

.card img {
  width:100%;
  border-radius:10px;
  margin:10px 0;
}

</style>
</head>

<body>

<header>PulseGurgaon</header>

<div class="nav">
  <button class="active">All</button>
  <button>India</button>
  <button>World</button>
  <button>Tech</button>
  <button>Finance</button>
</div>

<div class="search">
  <input id="search" placeholder="Search or ask AI...">
  <button onclick="searchAI()">Search</button>
</div>

<div class="container" id="news"></div>

<script>

async function loadNews(){
  let res = await fetch('/api/news');
  let data = await res.json();

  document.getElementById("news").innerHTML =
    data.map(n=>`
      <div class="card" onclick="openArticle('${n.id}')">
        <div class="category">${n.category}</div>
        <h3>${n.title}</h3>
        ${n.image ? `<img src="${n.image}">` : ""}
        <p>${JSON.parse(n.summary)[0]}</p>
      </div>
    `).join('');
}

function openArticle(id){
  window.location.href = "article.html?id=" + id;
}

async function searchAI(){
  let q = document.getElementById("search").value;

  let res = await fetch('/api/ai-search?q='+q);
  let data = await res.json();

  alert(JSON.stringify(data,null,2));
}

loadNews();

</script>

</body>
</html>
