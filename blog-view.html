<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog - PulseGurgaon</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#f4f6f9;
}

header {
  background:linear-gradient(90deg,#ff3b3b,#ff0000);
  color:white;
  padding:15px;
  font-size:20px;
}

.container {
  max-width:800px;
  margin:auto;
  padding:15px;
}

.section {
  background:white;
  padding:15px;
  margin-top:15px;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

button {
  padding:10px 20px;
  background:red;
  color:white;
  border:none;
  border-radius:8px;
}
</style>
</head>

<body>

<header>PulseGurgaon</header>

<div class="container" id="blog"></div>

<script>

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

async function loadBlog(){
  let res = await fetch('/api/blogs');
  let data = await res.json();

  let b = data.find(x => x.id === id);

  if(!b){
    document.getElementById("blog").innerHTML = "<h2>Blog not found</h2>";
    return;
  }

  document.getElementById("blog").innerHTML = `
    <h1>${b.title}</h1>

    <div style="color:gray;margin-bottom:10px">
      ${b.category || "General"} • ${new Date(b.date).toLocaleString()}
    </div>

    <div class="section">
      <p style="line-height:1.7">${b.content}</p>
    </div>

    <div style="margin-top:20px;text-align:center">
      <button onclick="window.location.href='blog.html'">⬅ Back</button>
    </div>
  `;
}

loadBlog();

</script>

</body>
</html>
